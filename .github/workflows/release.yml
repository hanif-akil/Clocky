name: Build Clocky v3

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────
  # WINDOWS BUILD
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Build Release
        run: cargo build --release --verbose
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clocky-v3-Windows-x64
          path: target/release/Clocky.exe

  # ────────────────────────────────────────────
  # LINUX BUILD (AppImage)
  # ────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # Minimal deps: only what eframe + xdg-portal need
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libasound2-dev pkg-config \
            libwayland-dev libegl1-mesa-dev libfontconfig1-dev \
            libfreetype6-dev libexpat1-dev libssl-dev fuse

      - name: Build Release Binary
        run: cargo build --release --verbose

      - name: Create AppImage Bundle
        run: |
          mkdir -p AppDir/usr/bin
          cp target/release/Clocky AppDir/usr/bin/

          cat > AppDir/Clocky.desktop << 'EOF'
          [Desktop Entry]
          Name=Clocky
          Exec=Clocky
          Icon=clocky
          Type=Application
          Categories=Utility;Clock;
          EOF

          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clocky-v3-Linux-x64
          path: Clocky*.AppImage
